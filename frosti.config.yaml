# 网站的基本信息
site:
  tab: Kumo's Blog # 浏览器标签栏上显示的文本
  title: 💠 Kumo's Blog # 网站的标题
  description: Personal Blog Website 🚀 Developed with Astro # 网站的描述，用于SEO等
  language: zh # 网站的语言，例如 "en" 是英文
  favicon: /favicon.ico # 网站的图标，用于浏览器标签栏和其他地方显示
  theme: # 更多主题 https://daisyui.com/docs/themes/
    light: winter # 主题的浅色模式
    dark: dracula # 主题的深色模式
    code: github-dark # 代码块的主题 https://expressive-code.com/guides/themes/
  date_format: ddd MMM DD YYYY # 日期格式设置，支持自定义格式
  blog: # 博客相关配置
    pageSize: 8 # 每页显示的文章数量
  menu: # 菜单配置
    - id: home # 菜单项的唯一标识符
      text: 主页 Home # 菜单项显示的文本
      href: / # 菜单项链接的地址
      svg: "material-symbols:home-outline-rounded"
      target: _self
    - id: about
      text: 关于 About
      href: /about
      svg: "material-symbols:info-outline-rounded"
      target: _self
    - id: blog
      text: 博客 Blog
      href: /blog
      svg: "material-symbols:book-2-outline-rounded"
      target: _self
      subItems:
        - id: all
          text: 全部文章 All
          href: /blog
          svg: "material-symbols:ink-pen-outline-rounded"
          target: _self
        - id: documentation
          text: 笔记 Notebooks
          href: /blog/category/Notebooks
          svg: "material-symbols:unknown-document-outline-rounded"
          target: _self
        - id: Changelog
          text: 日志 Changlog
          href: /blog/category/Changelog
          svg: "material-symbols:deployed-code-outline"
          target: _self
    - id: project
      text: 项目 Project
      href: /    #因为劳资没弄好
      svg: "material-symbols:code-blocks-outline"
      target: _self
    - id: friend
      text: 友链 Friend
      href: /friend
      svg: "material-symbols:supervisor-account-outline-rounded"
      target: _self
    - id: contact
      text: 联系 Contact
      href: "mailto:kumomayu@outlook.com"
      target: _blank
      svg: "material-symbols:attach-email-outline-rounded"


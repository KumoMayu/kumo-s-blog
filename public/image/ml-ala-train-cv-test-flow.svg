<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620">
<defs>
<style>
.t{font:700 48px Arial,'Noto Sans SC','Microsoft YaHei',sans-serif;fill:#1e293b}
.m{font:600 28px Arial,'Noto Sans SC','Microsoft YaHei',sans-serif;fill:#334155}
.s{font:500 22px Arial,'Noto Sans SC','Microsoft YaHei',sans-serif;fill:#64748b}
.b1{fill:#eff6ff;stroke:#93c5fd;stroke-width:3}
.b2{fill:#f5f3ff;stroke:#c4b5fd;stroke-width:3}
.b3{fill:#f0fdf4;stroke:#86efac;stroke-width:3}
.a{stroke:#60a5fa;stroke-width:6;fill:none;marker-end:url(#m)}
</style>
<marker id="m" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
  <path d="M0,0 L0,10 L12,5 z" fill="#60a5fa"/>
</marker>
</defs>
<rect width="1400" height="620" fill="#ffffff"/>
<text x="700" y="72" text-anchor="middle" class="t">Train / CV / Test</text>

<rect x="90" y="170" width="340" height="180" rx="26" class="b1"/>
<rect x="530" y="170" width="340" height="180" rx="26" class="b2"/>
<rect x="970" y="170" width="340" height="180" rx="26" class="b3"/>

<text x="260" y="240" text-anchor="middle" class="m">Train</text>
<text x="260" y="290" text-anchor="middle" class="s">fit</text>

<text x="700" y="240" text-anchor="middle" class="m">CV</text>
<text x="700" y="290" text-anchor="middle" class="s">select</text>

<text x="1140" y="240" text-anchor="middle" class="m">Test</text>
<text x="1140" y="290" text-anchor="middle" class="s">report</text>

<path d="M430 260 H520" class="a"/>
<path d="M870 260 H960" class="a"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720">
<style>
.t{font:700 48px Arial,'Noto Sans SC','Microsoft YaHei',sans-serif;fill:#1e293b}
.m{font:600 26px Arial,'Noto Sans SC','Microsoft YaHei',sans-serif;fill:#334155}
.s{font:500 22px Arial,'Noto Sans SC','Microsoft YaHei',sans-serif;fill:#64748b}
.ax{stroke:#94a3b8;stroke-width:4}
.tr{stroke:#3b82f6;stroke-width:7;fill:none}
.cv{stroke:#10b981;stroke-width:7;fill:none}
.d{stroke:#cbd5e1;stroke-width:3;stroke-dasharray:10 10}
</style>
<rect width="1400" height="720" fill="#ffffff"/>
<text x="700" y="70" text-anchor="middle" class="t">Bias / Variance</text>

<line x1="170" y1="590" x2="1240" y2="590" class="ax"/>
<line x1="170" y1="590" x2="170" y2="140" class="ax"/>

<text x="700" y="660" text-anchor="middle" class="m">complexity</text>
<text x="80" y="365" transform="rotate(-90 80 365)" text-anchor="middle" class="m">error</text>

<path d="M220 500 C360 430,520 340,690 260 C840 200,1020 165,1210 150" class="tr"/>
<path d="M220 240 C370 310,520 410,670 500 C800 565,940 530,1210 230" class="cv"/>

<line x1="470" y1="150" x2="470" y2="590" class="d"/>
<line x1="980" y1="150" x2="980" y2="590" class="d"/>

<text x="300" y="125" class="m">high bias</text>
<text x="650" y="125" class="m">balanced</text>
<text x="1040" y="125" class="m">high variance</text>

<text x="1120" y="162" class="s">J_train</text>
<text x="1120" y="248" class="s">J_cv</text>
</svg>